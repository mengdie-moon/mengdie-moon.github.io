    <script src="js/frist.js"></script>
    <script src="js/game.js"></script>
	<script>
		const g = new Game("#map");
		const btn = document.querySelectorAll(".btn button");
		btn[1].setAttribute("disabled", true);
		btn[0].onclick = () => {
		  btn[0].setAttribute("disabled", true);
		  btn[1].removeAttribute("disabled");
		  g.start();
		};
		btn[1].onclick = () => {
		  btn[0].removeAttribute("disabled");
		  btn[1].setAttribute("disabled", true);
		  g.pause();
		};
		btn[2].onclick = () => {
		  g.restart();
		};
   
		//判断上下左右
		document.onkeydown = (e) => {
		  switch (e.keyCode) {
			case 37:
			case 65:
			  g.change("left");
			  break;
			case 38:
			case 87:
			  g.change("top");
			  break;
			case 39:
			case 68:
			  g.change("right");
			  break;
			case 40:
			case 83:
			  g.change("bottom");
			  break;
		  }
		};
	</script>
	<script src="js/KanBanNiang/live2d.js"></script>
