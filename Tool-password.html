          border-radius: 4px;

        }
      
        input[type="checkbox"] {

        }
      
        .checkbox-group {

        }
      
        button {

          padding: 10px;
          margin-bottom: 10px;
          background-color: #5cb85c;
          color: white;
          border: none;
          border-radius: 4px;
          cursor: pointer;
          transition: background-color 0.3s ease;
        }
      
        button:hover {
          background-color: #4cae4c;
        }
      
        @media (max-width: 480px) {
