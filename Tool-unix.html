          padding: 10px;
          margin-top: 10px;
          border: 1px solid #ddd;
          border-radius: 4px;
          box-sizing: border-box;
          outline: none;
        }
        button {
          background-color: rgba(0,0,0,0.4);
          color: white;
          border: none;
          cursor: pointer;
          font-size: 16px;
          transition: box-shadow 0.3s ease;
        }
        button:hover {
            background-color: #333;
            box-shadow: 0px 10px 15px -3px rgba(68,68,68,0.25);
        }
        textarea {
          max-height: 80px;
          font-family: 'Courier New', Courier, monospace;
          resize: vertical;
        }
        label {
          display: block;
          margin-top: 20px;
          margin-bottom: 5px;
          font-weight: bold;
        }
        .readonly{
            cursor: not-allowed;
        }
