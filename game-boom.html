<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/more-game5.css">
	<link rel="icon" href="img/logo.png">
    <link rel="stylesheet" type="text/css" href="css/KanBanNiang/waifu.css"/>
    <script src="https://cdn.bootcss.com/jquery/3.2.1/jquery.min.js"></script>
	<title>Game-扫雷</title>
</head>
<body>
    <style>
        #main{
            margin:  100px auto;
            border-radius: 10px;
            box-shadow: 0px 10px 15px -3px rgba(68,68,68,0.25);
            background-color: #fff;
            padding: 20px;
            width: 50%;
        }
        .level{
            text-align: center;
            margin-bottom: 10px
        }
        .level button{
            padding: 5px 15px;
            background: #1565C0;
            border: none;
            color: #fff;
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }
        .level button.active{
            background: #00abff;

        }
        table{
            border-spacing: 1px;
            background-image: linear-gradient(to bottom right, #B3E5FC, #3644BE);
            margin: 0 auto;
        }
        td{
            padding: 0;
            width: 20px;
            height: 20px;
            background: rgba(255,255,255,0);
            border: 2px solid;
            border-color: #95CCF6 #3644BE #3644BE #95CCF6;
            text-align: center;
            line-height: 20px;
        }
        td.zero{
            border-color: #E1F5FE;
            background: #E1F5FE;
        }
        td.one{
            border-color: #E1F5FE;
            background: #E1F5FE;
            color: #0332fe;
        }
        td.two{
            border-color: #E1F5FE;
            background: #E1F5FE;
            color: #019f02;
        }
        td.three{
            border-color: #E1F5FE;
            background: #E1F5FE;
            color: #ff2600;
        }
        td.four{
            border-color: #E1F5FE;
            background: #E1F5FE;
            color: #93208f;
        }
        td.five{
            border-color: #E1F5FE;
            background: #E1F5FE;
            color: #ff7f29;
        }
        td.six{
            border-color: #E1F5FE;
            background: #E1F5FE;
            color: #ff3fff;
        }
        td.seven{
            border-color: #E1F5FE;
            background: #E1F5FE;
            color: #3fffbf;
        }
        td.eight{
            border-color: #E1F5FE;
            background: #E1F5FE;
            color: #22ee0f;
        }
        .info{
            text-align: center;
            margin-top: 10px;
        }
        .mine {
            background: #E1F5FE url(../img/bg3.png) no-repeat center;
            background-size:cover;
        }
        .flag{
            background: #E3F2FD url(../img/bg2.png) no-repeat center;
            background-size:cover;
        }

    </style>
    <link rel="stylesheet" type="text/css" href="css/KanBanNiang/waifu.css">
	<div class="waifu" id="waifu">
        <div class="waifu-tips" style="opacity: 1;"></div>
        <canvas id="live2d" width="280" height="250" class="live2d"></canvas>
        <div class="waifu-tool">
            <span class="fui-home"></span>
            <span class="fui-chat"></span>
            <span class="fui-eye"></span>
            <span class="fui-user"></span>
            <span class="fui-photo"></span>
            <span class="fui-info-circle"></span>
            <span class="fui-cross"></span>
        </div>
    </div>
    <div class="page">
		<!-- 顶部导航 -->
		<div class="page-top">
			<a href="index.html">
				梦蝶个人网站
			</a>
			<div class="search">
				<img src="img/csdn.png" class="search-icon" id="csdn-icon" alt="csdn">
				<img src="img/sougo.png" alt="" class="search-icon" id="sougo-icon">
				<img src="img/bing.png" alt="Bing" class="search-icon" id="bing-icon">
    			<img src="img/baidu.png" alt="Baidu" class="search-icon active" id="baidu-icon">
    			<input type="text" id="expandable-input" placeholder="Baidu Search..." onkeydown="handleKeyDown(event)">
			</div>
			<p>对未来真正的慷慨，是把一切献给现在。----加缪</p>
		</div>
		<!-- 内容 -->
		<div class="page-con">
			<div class="pc-nav">
				<div class="nav">
					<div class="time">
						<span>Now：</span>
						<div id="current-time"></div>
					</div>
					<a href="index.html">首页</a>
					<a href="about-main.html">关于我</a>
					<a href="yuanma-main.html">源码下载</a>
					<a href="live-spen.html">生活随笔</a>
					<a href="game.html"  class="clicked">更多精彩</a>
					<h3>每日一言:</h3>
					<p id="quoteDisplay"></p>
				</div>
				<div class="code">
					<img src="img/Addwe.png" alt="咦?图片被外星人拐走了">
					<p>扫码 加入我们~~</p>
				</div>
			</div>
            <div class="pc-box">
                <div id="main">
                    <h3 style="margin: 25px 0; text-align: center; font-family: 'Courier New', Courier, monospace; color: #949393; font-size: 20px;">赌狗游戏-扫💣</h3>
                    <div class="level">
                        <button class="active">初级</button>
                        <button>中级</button>
                        <button>高级</button>
                        <button>重新开始</button>
                    </div>
                    <div class="gameBox">
            
                    </div>
                    <div class="info">剩余雷数：<span class="mineNum"></span></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/frist.js"></script>
    <script src="js/game.js"></script>
    <script src="js/KanBanNiang/live2d.js"></script>
    <script src="js/KanBanNiang/waifu-tips.js"></script>
    <script type="text/javascript">initModel()</script>

    <link rel="stylesheet" type="text/css" href="css/KanBanNiang/flat-ui.min.css"/>
</body>
</html>
